<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEXTLI | Centro de Prototipos 3D</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Google Model Viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; overflow-x: hidden; }
        
        .glow-bg-1 { position: fixed; top: -10%; left: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(45,212,191,0.08) 0%, rgba(2,6,23,0) 70%); z-index: -1; pointer-events: none; }
        .glow-bg-2 { position: fixed; bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(56,189,248,0.05) 0%, rgba(2,6,23,0) 70%); z-index: -1; pointer-events: none; }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            border-color: rgba(45, 212, 191, 0.3);
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-2px);
        }
        
        .text-accent { color: #2dd4bf; }
        .bg-accent { background-color: #2dd4bf; }
        
        .canvas-container { 
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); 
        }
        
        .tool-btn {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }
        .tool-btn:hover { background: rgba(45, 212, 191, 0.2); border-color: #2dd4bf; color: #2dd4bf; }
        .tool-btn.active { background: #2dd4bf; color: #0f172a; border-color: #2dd4bf; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
            border-radius: 2.2rem;
            outline: none;
        }

        /* Notifications */
        #toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-left: 4px solid #2dd4bf;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .toast.show { transform: translateX(0); }
        .toast.error { border-left-color: #ef4444; }
        .toast.error i { color: #ef4444; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative">

    <div class="glow-bg-1"></div>
    <div class="glow-bg-2"></div>
    <div id="toast-container"></div>

    <nav class="fixed w-full z-50 bg-slate-950/80 backdrop-blur-xl border-b border-white/5 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="#" class="flex items-center gap-3 group">
                <div class="w-10 h-10 bg-teal-400/10 rounded-xl flex items-center justify-center border border-teal-400/20 group-hover:border-teal-400/50 group-hover:bg-teal-400/20 transition-all">
                    <i class="fas fa-cube text-accent text-lg"></i>
                </div>
                <div class="flex flex-col">
                    <span class="text-xl font-black italic tracking-tighter leading-none">VEXTLI</span>
                    <span class="text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold mt-1">Portal 3D</span>
                </div>
            </a>
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-slate-600 animate-pulse"></div>
                    <div id="auth-status" class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Iniciando...</div>
                </div>
                <div class="h-6 w-px bg-white/10"></div>
                <button onclick="requestAdminAccess()" class="opacity-40 hover:opacity-100 transition-opacity p-2 text-slate-300 hover:text-accent">
                    <i class="fas fa-sliders-h text-lg"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-grow pt-32 px-6 pb-16 max-w-7xl mx-auto w-full relative z-10">
        
        <!-- HOME VIEW -->
        <section id="view-home" class="animate-fade-in">
            <header class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
                <div>
                    <h1 class="text-4xl md:text-6xl font-black italic uppercase tracking-tighter mb-4 text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400">
                        Nuestros <br><span class="text-accent">Clientes</span>
                    </h1>
                </div>
                <div class="flex gap-4">
                    <div class="glass-card px-6 py-4 rounded-2xl border-none bg-slate-900/50 text-center min-w-[100px]">
                        <div class="text-3xl font-black text-white" id="stat-brands">0</div>
                        <div class="text-[10px] uppercase tracking-wider text-slate-500 font-bold mt-1">Empresas</div>
                    </div>
                </div>
            </header>
            <div id="loading-home" class="text-center py-32">
                <i class="fas fa-circle-notch fa-spin text-accent text-4xl mb-4"></i>
            </div>
            <div id="brands-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </section>

        <!-- SAMPLES VIEW -->
        <section id="view-samples" class="hidden animate-fade-in">
            <button onclick="showView('home')" class="mb-8 text-slate-400 hover:text-accent font-bold uppercase text-xs flex items-center gap-2 transition-colors">
                <i class="fas fa-arrow-left"></i> Volver al Inicio
            </button>
            <div class="glass-card p-8 rounded-[2rem] mb-10">
                <h2 id="brand-title" class="text-4xl md:text-5xl font-black italic uppercase tracking-tighter">Empresa</h2>
            </div>
            <div id="samples-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <!-- VIEWER VIEW -->
        <section id="view-viewer" class="hidden animate-fade-in">
            <div class="max-w-6xl mx-auto">
                <button onclick="showView('samples')" class="mb-6 text-slate-400 hover:text-accent font-bold uppercase text-xs flex items-center gap-2">
                    <i class="fas fa-arrow-left"></i> Volver a Prototipos
                </button>
                <div class="glass-card rounded-[2.5rem] p-2 overflow-hidden relative shadow-2xl">
                    <div id="loading-indicator" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950/90 z-20 rounded-[2.2rem] hidden">
                        <i class="fas fa-cube text-accent text-4xl animate-bounce mb-4"></i>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Cargando 3D...</p>
                    </div>
                    <div class="canvas-container w-full h-[65vh] rounded-[2.2rem]">
                        <model-viewer id="mv-container" camera-controls touch-action="none" shadow-intensity="1.5" exposure="1.2" environment-image="neutral"></model-viewer>
                    </div>
                </div>
                <div class="mt-6 text-center">
                    <h3 id="sample-name-viewer" class="text-2xl font-black uppercase italic">Nombre</h3>
                    <p id="sample-desc-viewer" class="text-slate-400 mt-2"></p>
                </div>
            </div>
        </section>

        <!-- ADMIN PANEL -->
        <section id="view-admin" class="hidden animate-fade-in">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl md:text-4xl font-black italic uppercase tracking-tighter">Panel <span class="text-accent">VEXTLI</span></h2>
                <button onclick="showView('home')" class="text-xs font-bold uppercase tracking-widest text-slate-400 hover:text-white transition-colors">Cerrar</button>
            </div>

            <div class="grid lg:grid-cols-12 gap-8">
                <div class="lg:col-span-5 glass-card p-8 rounded-[2rem]">
                    <h3 class="text-sm font-black uppercase tracking-widest mb-6"><i class="fas fa-folder mr-2 text-accent"></i> Empresas</h3>
                    <div class="flex gap-3 mb-8">
                        <input type="text" id="admin-brand-input" placeholder="Nombre empresa..." class="flex-grow bg-slate-950/50 border border-white/10 rounded-xl px-4 py-3 text-sm focus:border-accent outline-none">
                        <button onclick="addBrand()" class="bg-accent text-slate-950 px-5 rounded-xl font-bold"><i class="fas fa-plus"></i></button>
                    </div>
                    <div id="admin-brands-list" class="space-y-4"></div>
                </div>

                <div class="lg:col-span-7 glass-card p-8 rounded-[2rem]">
                    <h3 class="text-sm font-black uppercase tracking-widest mb-6"><i class="fas fa-upload mr-2 text-accent"></i> Nuevo Prototipo</h3>
                    <form id="admin-sample-form" class="space-y-5">
                        <select id="admin-select-brand" required class="w-full bg-slate-950/50 border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none"></select>
                        <input type="text" id="admin-sample-name" placeholder="Nombre del modelo..." required class="w-full bg-slate-950/50 border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none">
                        <textarea id="admin-sample-desc" placeholder="Descripción..." class="w-full bg-slate-950/50 border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none h-24 resize-none"></textarea>
                        <div class="border-2 border-dashed border-white/10 rounded-xl p-6 text-center">
                            <input type="file" id="admin-file" accept=".glb,.stl" required class="text-xs text-slate-400">
                        </div>
                        <button type="submit" id="admin-submit-btn" class="w-full bg-white text-slate-950 py-4 rounded-xl font-black uppercase tracking-widest text-xs hover:bg-accent transition-colors">Subir Prototipo</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA32fzj94oSeGgCa_7h7iEgoEpoJQggqpU",
            authDomain: "base-vextli.firebaseapp.com",
            projectId: "base-vextli",
            storageBucket: "base-vextli.firebasestorage.app",
            messagingSenderId: "589687023966",
            appId: "1:589687023966:web:c05e8ed8285309d2f747cf"
        };

        const appIdentifier = 'vextli-portal-v1';
        let db, auth, brandsData = [];

        // Init Firebase
        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);

        // Toast Helper
        window.showToast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'error' ? 'error' : ''}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check' : 'fa-info'}-circle"></i><span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        // UI Handlers
        window.showView = (v) => {
            ['home', 'samples', 'viewer', 'admin'].forEach(view => document.getElementById(`view-${view}`).classList.add('hidden'));
            document.getElementById(`view-${v}`).classList.remove('hidden');
        };

        window.requestAdminAccess = () => {
            const p = prompt("Acceso Vextli:");
            if(p === "vextli") { showView('admin'); showToast("Admin Logged In"); }
        };

        // --- CRUD OPERATIONS ---

        window.addBrand = async () => {
            const input = document.getElementById('admin-brand-input');
            const name = input.value.trim();
            if(!name) return;
            const id = 'brand_' + Date.now();
            try {
                await setDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'brands', id), {
                    id, name, samples: [], createdAt: Date.now()
                });
                input.value = '';
                showToast(`Empresa "${name}" creada`);
            } catch(e) { showToast("Error al crear empresa", "error"); }
        };

        // ELIMINAR EMPRESA (CORREGIDO)
        window.deleteBrand = async (brandId) => {
            if(!confirm("¿Eliminar esta empresa y todos sus prototipos asociados?")) return;
            try {
                // Buscamos la empresa en los datos locales para saber qué prototipos tiene
                const brand = brandsData.find(b => b.id === brandId);
                
                // 1. Borramos los archivos 3D pesados de cada prototipo primero
                if(brand && brand.samples) {
                    for(const s of brand.samples) {
                        await deleteDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'files', s.id));
                    }
                }

                // 2. Borramos el documento de la empresa
                await deleteDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'brands', brandId));
                showToast("Empresa eliminada por completo");
            } catch(e) {
                console.error(e);
                showToast("Error al eliminar de Firebase", "error");
            }
        };

        window.deleteSample = async (brandId, sampleId) => {
            if(!confirm("¿Eliminar este prototipo?")) return;
            try {
                const brand = brandsData.find(b => b.id === brandId);
                const sample = brand.samples.find(s => s.id === sampleId);
                if(sample) {
                    await deleteDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'files', sampleId));
                    await updateDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'brands', brandId), {
                        samples: arrayRemove(sample)
                    });
                    showToast("Prototipo borrado");
                }
            } catch(e) { showToast("Error al borrar", "error"); }
        };

        window.openBrand = (brand) => {
            document.getElementById('brand-title').innerText = brand.name;
            const grid = document.getElementById('samples-grid');
            grid.innerHTML = brand.samples.length ? brand.samples.map(s => `
                <div class="glass-card p-6 rounded-3xl cursor-pointer hover:border-accent/40" onclick='openViewer(${JSON.stringify(s)})'>
                    <div class="w-12 h-12 rounded-xl bg-slate-800 flex items-center justify-center mb-4"><i class="fas fa-cube text-accent"></i></div>
                    <h4 class="font-black italic uppercase">${s.name}</h4>
                    <p class="text-xs text-slate-500 mt-1">${s.date || ''}</p>
                </div>
            `).join('') : '<div class="col-span-full py-20 text-center text-slate-600">No hay prototipos</div>';
            showView('samples');
        };

        window.openViewer = async (sample) => {
            showView('viewer');
            const loader = document.getElementById('loading-indicator');
            document.getElementById('sample-name-viewer').innerText = sample.name;
            document.getElementById('sample-desc-viewer').innerText = sample.desc || '';
            loader.classList.remove('hidden');
            try {
                const f = await getDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'files', sample.id));
                if(f.exists()) {
                    const mv = document.getElementById('mv-container');
                    mv.src = f.data().fileData;
                    mv.addEventListener('load', () => loader.classList.add('hidden'), {once: true});
                }
            } catch(e) { loader.classList.add('hidden'); showToast("Error cargando 3D", "error"); }
        };

        // Auth & Sync
        signInAnonymously(auth).then(() => {
            onAuthStateChanged(auth, (user) => {
                if(user) {
                    document.getElementById('status-dot').classList.replace('bg-slate-600', 'bg-accent');
                    document.getElementById('auth-status').innerText = "Online";
                    
                    onSnapshot(collection(db, 'artifacts', appIdentifier, 'public', 'data', 'brands'), (snap) => {
                        brandsData = snap.docs.map(d => d.data());
                        updateUI();
                        document.getElementById('loading-home').classList.add('hidden');
                    });
                }
            });
        });

        function updateUI() {
            // Home Grid
            document.getElementById('brands-grid').innerHTML = brandsData.map(b => `
                <div class="glass-card p-8 rounded-[2rem] cursor-pointer group" onclick='openBrand(${JSON.stringify(b)})'>
                    <div class="flex justify-between items-center mb-6">
                        <i class="far fa-building text-slate-500 group-hover:text-accent transition-colors"></i>
                        <span class="text-[10px] font-bold text-slate-600 uppercase">${b.samples?.length || 0} Modelos</span>
                    </div>
                    <h3 class="font-black italic text-xl">${b.name}</h3>
                </div>
            `).join('');

            // Admin List (System of folders)
            document.getElementById('admin-brands-list').innerHTML = brandsData.map(b => `
                <div class="bg-slate-900/40 rounded-2xl border border-white/5 overflow-hidden">
                    <div class="p-4 bg-slate-800/50 flex justify-between items-center">
                        <span class="text-xs font-bold uppercase tracking-wider text-slate-300">${b.name}</span>
                        <button onclick="deleteBrand('${b.id}')" class="text-slate-500 hover:text-red-500 transition-colors"><i class="fas fa-trash-alt"></i></button>
                    </div>
                    <div class="p-3 space-y-2">
                        ${b.samples.map(s => `
                            <div class="flex justify-between items-center bg-slate-950/50 p-3 rounded-xl border border-white/5 group">
                                <span class="text-[11px] font-medium text-slate-400">${s.name}</span>
                                <button onclick="deleteSample('${b.id}', '${s.id}')" class="text-slate-700 hover:text-orange-400 opacity-0 group-hover:opacity-100 transition-all"><i class="fas fa-times"></i></button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');

            // Update Select & Stats
            document.getElementById('admin-select-brand').innerHTML = brandsData.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
            document.getElementById('stat-brands').innerText = brandsData.length;
        }

        // Upload Logic
        document.getElementById('admin-sample-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('admin-submit-btn');
            const file = document.getElementById('admin-file').files[0];
            const brandId = document.getElementById('admin-select-brand').value;
            if(!file || !brandId) return;

            btn.disabled = true;
            btn.innerText = "Subiendo...";

            const reader = new FileReader();
            reader.onload = async (ev) => {
                const sampleId = 's_' + Date.now();
                try {
                    await setDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'files', sampleId), { fileData: ev.target.result });
                    const meta = {
                        id: sampleId,
                        name: document.getElementById('admin-sample-name').value,
                        desc: document.getElementById('admin-sample-desc').value,
                        date: new Date().toLocaleDateString()
                    };
                    await updateDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'brands', brandId), { samples: arrayUnion(meta) });
                    showToast("Prototipo cargado");
                    e.target.reset();
                } catch(e) { showToast("Error al subir", "error"); }
                btn.disabled = false;
                btn.innerText = "Subir Prototipo";
            };
            reader.readAsDataURL(file);
        };
    </script>
</body>
</html>
