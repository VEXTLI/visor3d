<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEXTLI | Multi-Material 3D Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>

    <!-- Three.js y Loaders -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; overflow-x: hidden; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .text-accent { color: #2dd4bf; }
        .bg-accent { background-color: #2dd4bf; }
        .canvas-container { 
            cursor: grab; 
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%); 
        }
        .canvas-container:active { cursor: grabbing; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease forwards; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="fixed w-full z-50 bg-slate-950/90 backdrop-blur-md border-b border-white/5 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="#" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-teal-400/20 rounded-lg flex items-center justify-center border border-teal-400/30">
                    <i class="fas fa-cube text-accent"></i>
                </div>
                <span class="text-2xl font-black italic tracking-tighter">VEXTLI</span>
            </a>
            <div class="flex items-center gap-4">
                <div id="auth-status" class="text-[10px] uppercase font-bold text-slate-500 italic">Conectando...</div>
                <button onclick="requestAdminAccess()" class="opacity-30 hover:opacity-100 transition-opacity p-2">
                    <i class="fas fa-cog text-xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-grow pt-28 px-6 pb-12 max-w-7xl mx-auto w-full">
        <!-- Home -->
        <section id="view-home" class="animate-fade-in">
            <header class="mb-12">
                <h1 class="text-4xl md:text-5xl font-black italic uppercase tracking-tighter mb-3">Portal <span class="text-accent">Empresas</span></h1>
                <p class="text-slate-400 italic">Selecciona un cliente para ver sus prototipos.</p>
            </header>
            <div id="loading-home" class="text-center py-20">
                <i class="fas fa-circle-notch fa-spin text-accent text-3xl"></i>
            </div>
            <div id="brands-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </section>

        <!-- Samples -->
        <section id="view-samples" class="hidden animate-fade-in">
            <button onclick="showView('home')" class="mb-8 text-accent font-bold uppercase text-xs flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> Volver
            </button>
            <h2 id="brand-title" class="text-4xl font-black italic uppercase mb-8">Empresa</h2>
            <div id="samples-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <!-- Visor 3D -->
        <section id="view-viewer" class="hidden animate-fade-in flex flex-col items-center">
            <div class="w-full max-w-5xl">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="showView('samples')" class="text-accent font-bold uppercase text-xs flex items-center gap-2">
                        <i class="fas fa-arrow-left"></i> Volver
                    </button>
                    <div id="color-badge" class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase bg-white/10 border border-white/5"></div>
                </div>
                <div class="glass-card rounded-[2.5rem] p-2 overflow-hidden relative">
                    <div id="loading-indicator" class="absolute inset-0 flex items-center justify-center bg-slate-900/80 z-10 rounded-[2.2rem] hidden">
                        <i class="fas fa-circle-notch fa-spin text-accent text-3xl"></i>
                    </div>
                    <div id="3d-container" class="canvas-container w-full h-[60vh] rounded-[2.2rem]"></div>
                </div>
                <div class="mt-8 text-center">
                    <h3 id="sample-name-viewer" class="text-3xl font-black italic uppercase">Nombre</h3>
                </div>
            </div>
        </section>

        <!-- Admin -->
        <section id="view-admin" class="hidden animate-fade-in">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black italic uppercase">Panel Admin</h2>
                <button onclick="showView('home')" class="bg-white/10 px-5 py-2 rounded-xl text-xs font-bold uppercase">Cerrar</button>
            </div>
            <div class="grid md:grid-cols-2 gap-8">
                <div class="glass-card p-8 rounded-3xl h-fit">
                    <h3 class="text-sm font-black uppercase mb-5 text-accent">1. Nueva Empresa</h3>
                    <div class="flex gap-3">
                        <input type="text" id="admin-brand-input" placeholder="Nombre..." class="flex-grow bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-sm">
                        <button onclick="addBrand()" class="bg-accent text-slate-950 px-5 rounded-xl font-bold"><i class="fas fa-plus"></i></button>
                    </div>
                    <div id="admin-brands-list" class="mt-6 space-y-2 max-h-40 overflow-y-auto"></div>
                </div>
                <div class="glass-card p-8 rounded-3xl">
                    <h3 class="text-sm font-black uppercase mb-5 text-accent">2. Cargar Prototipo</h3>
                    <form id="admin-sample-form" class="space-y-4">
                        <select id="admin-select-brand" required class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-sm"></select>
                        <input type="text" id="admin-sample-name" placeholder="Nombre Prototipo" required class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-sm">
                        <select id="admin-sample-scheme" class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-sm">
                            <option value="black-white">Negro / Blanco</option>
                            <option value="white-black">Blanco / Negro</option>
                            <option value="teal-gold">Vextli Teal</option>
                        </select>
                        <input type="file" id="admin-file" accept=".stl,.glb" required class="text-xs text-slate-400 w-full file:bg-white/10 file:text-white file:px-4 file:py-2 file:rounded-lg">
                        <button type="submit" id="admin-submit-btn" class="w-full bg-white text-slate-950 py-4 rounded-xl font-black uppercase text-xs hover:bg-accent transition-colors">Subir</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA32fzj94oSeGgCa_7h7iEgoEpoJQggqpU",
            authDomain: "base-vextli.firebaseapp.com",
            projectId: "base-vextli",
            storageBucket: "base-vextli.firebasestorage.app",
            messagingSenderId: "589687023966",
            appId: "1:589687023966:web:c05e8ed8285309d2f747cf"
        };

        let db, auth, user, brandsData = [];
        const appId = 'vextli-portal-v1';
        let scene, camera, renderer, controls, animationId;

        const initFirebase = async () => {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            await signInAnonymously(auth);
            onAuthStateChanged(auth, (u) => {
                user = u;
                if (user) {
                    document.getElementById('auth-status').innerText = "Online";
                    setupRealtimeSync();
                }
            });
        };

        const setupRealtimeSync = () => {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'brands'), (snapshot) => {
                brandsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                refreshUI();
                document.getElementById('loading-home').classList.add('hidden');
            }, (error) => {
                console.error("Error sincronizando:", error);
            });
        };

        document.getElementById('admin-sample-form').onsubmit = async (e) => {
            e.preventDefault();
            const brandId = document.getElementById('admin-select-brand').value;
            const file = document.getElementById('admin-file').files[0];
            const submitBtn = document.getElementById('admin-submit-btn');

            submitBtn.disabled = true;
            submitBtn.innerText = 'Subiendo...';

            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    const isGLB = file.name.toLowerCase().endsWith('.glb');
                    const sampleObj = {
                        id: 's_' + Date.now(),
                        name: document.getElementById('admin-sample-name').value,
                        scheme: document.getElementById('admin-sample-scheme').value,
                        fileData: ev.target.result, 
                        isGLB: isGLB
                    };

                    // Firestore limit check (Document max 1MB)
                    if (JSON.stringify(sampleObj).length > 1048487) {
                        throw new Error("El archivo es demasiado grande (Límite 1MB Firestore). Intenta simplificar la malla en Blender.");
                    }

                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'brands', brandId), {
                        samples: arrayUnion(sampleObj)
                    });
                    alert("¡Prototipo subido correctamente!");
                    e.target.reset();
                } catch (err) { alert(err.message); }
                finally { submitBtn.disabled = false; submitBtn.innerText = 'Subir'; }
            };
            reader.readAsDataURL(file);
        };

        window.showView = (view) => {
            ['home', 'samples', 'viewer', 'admin'].forEach(v => document.getElementById(`view-${v}`).classList.add('hidden'));
            document.getElementById(`view-${view}`).classList.remove('hidden');
            if (view !== 'viewer' && animationId) {
                cancelAnimationFrame(animationId);
            }
        };

        window.requestAdminAccess = () => { if (prompt("Pass:") === "vextli") window.showView('admin'); };

        window.addBrand = async () => {
            const name = document.getElementById('admin-brand-input').value;
            if (name) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'brands', 'b_'+Date.now()), { name, samples: [] });
            document.getElementById('admin-brand-input').value = '';
        };

        window.deleteBrand = async (id) => { if(confirm("¿Seguro que deseas borrar esta empresa?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'brands', id)); };

        function refreshUI() {
            const grid = document.getElementById('brands-grid');
            grid.innerHTML = '';
            brandsData.forEach(b => {
                const div = document.createElement('div');
                div.className = "glass-card p-8 rounded-3xl cursor-pointer text-center hover:bg-white/5";
                div.onclick = () => openBrand(b);
                div.innerHTML = `<h3 class="font-black italic">${b.name}</h3>`;
                grid.appendChild(div);
            });
            const select = document.getElementById('admin-select-brand');
            select.innerHTML = brandsData.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
            document.getElementById('admin-brands-list').innerHTML = brandsData.map(b => `<div class="flex justify-between items-center p-3 mb-2 bg-white/5 rounded-xl text-sm border border-white/5"><span>${b.name}</span><button onclick="deleteBrand('${b.id}')" class="text-red-400 hover:text-red-300"><i class="fas fa-trash"></i></button></div>`).join('');
        }

        function openBrand(brand) {
            document.getElementById('brand-title').innerText = brand.name;
            const grid = document.getElementById('samples-grid');
            grid.innerHTML = brand.samples.map(s => `
                <div class="glass-card p-6 rounded-3xl cursor-pointer hover:border-accent/50" onclick='window.openViewer(${JSON.stringify(s)})'>
                    <div class="flex justify-between items-start mb-4">
                        <i class="fas ${s.isGLB ? 'fa-cubes' : 'fa-cube'} text-2xl text-accent/80"></i>
                        <span class="text-[9px] font-bold uppercase tracking-widest text-slate-400 border border-white/10 px-2 py-1 rounded-full">${s.isGLB ? 'GLB' : 'STL'}</span>
                    </div>
                    <h4 class="font-black italic uppercase">${s.name}</h4>
                </div>
            `).join('');
            if(brand.samples.length === 0) {
                grid.innerHTML = `<p class="text-slate-500 italic text-sm col-span-full">No hay prototipos cargados todavía.</p>`;
            }
            window.showView('samples');
        }

        window.openViewer = (sample) => {
            document.getElementById('sample-name-viewer').innerText = sample.name;
            document.getElementById('color-badge').innerText = sample.scheme;
            window.showView('viewer');
            // Damos un pequeño respiro para que el DOM se actualice y el canvas obtenga su ancho correcto
            setTimeout(() => initThree(sample), 50);
        };

        function initThree(sample) {
            const container = document.getElementById('3d-container');
            container.innerHTML = '';
            document.getElementById('loading-indicator').classList.remove('hidden');

            scene = new THREE.Scene();
            
            // FIX 1: Cambiamos el plano "near" de 0.1 a 0.001 para evitar recortes en objetos muy pequeños
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.001, 10000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Mejor resolución
            container.appendChild(renderer.domElement);

            // FIX 2: Mejor configuración de luces. HemisphereLight evita que las sombras queden 100% negras
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8);
            hemiLight.position.set(0, 200, 0);
            scene.add(hemiLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 20, 10);
            scene.add(directionalLight);

            const processGeometry = (geometryOrGroup) => {
                let mesh;
                if (sample.isGLB) {
                    mesh = geometryOrGroup;
                } else {
                    let color = 0x2dd4bf;
                    if (sample.scheme === 'black-white') color = 0x111111;
                    if (sample.scheme === 'white-black') color = 0xeeeeee;
                    
                    // FIX 3: Usamos MeshPhongMaterial. Funciona mucho mejor que Standard cuando no hay "Environment Maps"
                    const mat = new THREE.MeshPhongMaterial({ 
                        color: color, 
                        shininess: 80,
                        specular: 0x222222
                    });

                    // Calculamos normales por si el STL vino sin ellas (evita que se vea totalmente negro)
                    if (!geometryOrGroup.attributes.normal) {
                        geometryOrGroup.computeVertexNormals();
                    }
                    mesh = new THREE.Mesh(geometryOrGroup, mat);
                }

                // Ajustar al centro exacto
                const box = new THREE.Box3().setFromObject(mesh);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                
                mesh.position.sub(center);
                scene.add(mesh);

                // Auto-zoom cámara adaptativo (FIX 4: Fallback si maxDim es 0)
                const maxDim = Math.max(size.x, size.y, size.z) || 1; 
                const fov = camera.fov * (Math.PI / 180);
                let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
                cameraZ *= 2.5; 
                
                camera.position.set(cameraZ, cameraZ, cameraZ);
                camera.lookAt(0, 0, 0);

                controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.05;
                controls.target.set(0, 0, 0); // Aseguramos que rote sobre el centro

                document.getElementById('loading-indicator').classList.add('hidden');
                
                const animate = () => {
                    animationId = requestAnimationFrame(animate);
                    controls.update();
                    renderer.render(scene, camera);
                };
                animate();
            };

            const onError = (err) => {
                console.error("Error al cargar el 3D:", err);
                document.getElementById('loading-indicator').classList.add('hidden');
                alert("Hubo un problema procesando el archivo 3D. Verifica que no esté corrupto.");
            };

            // FIX 5: Usamos loaders nativos de forma segura para las DataURL en lugar de Fetch manual
            if (sample.isGLB) {
                new THREE.GLTFLoader().load(sample.fileData, (gltf) => processGeometry(gltf.scene), undefined, onError);
            } else {
                new THREE.STLLoader().load(sample.fileData, (geometry) => processGeometry(geometry), undefined, onError);
            }
        }

        // FIX 6: Listener global para redimensionar el canvas si se cambia el tamaño de la ventana
        window.addEventListener('resize', () => {
            const container = document.getElementById('3d-container');
            if (camera && renderer && container && container.clientWidth > 0) {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            }
        });

        initFirebase();
    </script>
</body>
</html>
