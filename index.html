<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEXTLI | Experience Center</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Google Model Viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

    <style>
        :root {
            --accent: #2dd4bf;
            --accent-glow: rgba(45, 212, 191, 0.4);
            --bg-dark: #010409;
            --surface: rgba(13, 17, 23, 0.7);
            --border: rgba(255, 255, 255, 0.05);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark); 
            color: #e6edf3; 
            overflow-x: hidden; 
            scroll-behavior: smooth;
        }

        /* Textura de Ruido */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.03;
            pointer-events: none;
            z-index: 50;
        }
        
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.15;
            animation: orbFloat 20s infinite alternate;
        }
        .orb-1 { top: -10%; right: -10%; width: min(500px, 80vw); height: min(500px, 80vw); background: var(--accent); }
        .orb-2 { bottom: -10%; left: -5%; width: min(600px, 90vw); height: min(600px, 90vw); background: #3b82f6; animation-delay: -5s; }

        @keyframes orbFloat {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(50px, 50px) scale(1.1); }
        }

        nav {
            background: rgba(1, 4, 9, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border);
        }

        .bento-card {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 32px;
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 220px;
        }

        .bento-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(45, 212, 191, 0.1) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .bento-card:hover {
            transform: translateY(-8px);
            border-color: rgba(45, 212, 191, 0.3);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.5);
        }

        /* En dispositivos táctiles deshabilitamos el hover agresivo */
        @media (hover: none) {
            .bento-card:hover { transform: none; }
        }

        .viewport-frame {
            position: relative;
            background: #000;
            border-radius: 24px;
            padding: 8px;
            box-shadow: 0 0 0 1px var(--border), 0 20px 50px rgba(0,0,0,0.8);
        }
        @media (min-width: 768px) {
            .viewport-frame { border-radius: 40px; padding: 12px; }
        }

        .viewport-inner {
            background: radial-gradient(circle at 50% 50%, #161b22 0%, #010409 100%);
            border-radius: 18px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @media (min-width: 768px) {
            .viewport-inner { border-radius: 32px; }
        }

        .btn-premium {
            background: #fff;
            color: #000;
            padding: 14px 28px;
            border-radius: 100px;
            font-weight: 800;
            letter-spacing: -0.02em;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }
        .btn-premium:hover {
            transform: scale(1.02);
            background: var(--accent);
            box-shadow: 0 15px 30px var(--accent-glow);
        }

        model-viewer {
            width: 100%;
            height: 100%;
            display: block;
            --poster-color: transparent;
        }

        .stagger-1 { animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        @keyframes slideUp {
            from { transform: translateY(40px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div id="toast-container"></div>

    <nav class="fixed w-full z-50 px-4 md:px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="https://vextli.github.io/VEXTLI/" class="flex items-center gap-3 md:gap-4 cursor-pointer group">
                <div class="relative w-8 h-8 md:w-10 md:h-10">
                    <div class="absolute inset-0 bg-accent rounded-lg md:rounded-xl blur-lg opacity-20 group-hover:opacity-60 transition-opacity"></div>
                    <div class="relative w-full h-full bg-slate-900 border border-white/10 rounded-lg md:rounded-xl flex items-center justify-center">
                        <i class="fas fa-microchip text-accent text-sm md:text-base"></i>
                    </div>
                </div>
                <div class="flex flex-col text-white">
                    <span class="text-lg md:text-xl font-black italic tracking-tighter uppercase leading-none">Vextli</span>
                    <span class="text-[8px] md:text-[9px] uppercase tracking-[0.3em] md:tracking-[0.4em] text-slate-500 font-bold">Portal NFC</span>
                </div>
            </a>

            <div class="flex items-center gap-4 md:gap-6">
                <div class="hidden sm:flex flex-col items-end">
                    <div id="auth-status" class="text-[9px] md:text-[10px] font-black uppercase tracking-widest text-accent">Sincronizado</div>
                    <div class="text-[8px] md:text-[9px] text-slate-500 font-bold uppercase tracking-tighter">Nodo Querétaro</div>
                </div>
                <button onclick="requestAdminAccess()" class="w-9 h-9 md:w-10 md:h-10 rounded-full border border-white/5 flex items-center justify-center hover:bg-white/5 transition-all">
                    <i class="fas fa-lock-open text-[10px] md:text-xs text-slate-500"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="pt-24 md:pt-32 pb-10 md:pb-20 px-4 md:px-6 max-w-7xl mx-auto relative z-10">
        
        <section id="view-home" class="stagger-1">
            <div class="mb-10 md:mb-16">
                <h1 class="text-4xl sm:text-5xl md:text-7xl lg:text-8xl font-black italic uppercase leading-[1] md:leading-[0.9] mb-4 md:mb-8">
                    Centro de Prototipos<br>
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-accent to-blue-500 inline-block py-1 md:py-2"></span>
                </h1>
                <p class="text-slate-500 text-base md:text-lg max-w-xl font-medium italic">Acceso a prototipado Vextli para empresas certificadas.</p>
            </div>

            <div id="loading-home" class="text-center py-20"><div class="inline-block w-8 h-8 border-2 border-accent/20 border-t-accent rounded-full animate-spin"></div></div>
            
            <div id="brands-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-8"></div>
        </section>

        <section id="view-samples" class="hidden stagger-1">
            <div class="flex items-center gap-4 mb-8 md:mb-12">
                <button onclick="showView('home')" class="w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl border border-white/5 flex items-center justify-center hover:bg-accent hover:text-black transition-all">
                    <i class="fas fa-arrow-left text-sm md:text-base"></i>
                </button>
                <div>
                    <h2 id="brand-title" class="text-2xl md:text-4xl font-black italic uppercase tracking-tighter">Empresa</h2>
                    <p class="text-[8px] md:text-[10px] uppercase tracking-[0.3em] md:tracking-[0.4em] text-accent font-bold">Archivo de prototipos</p>
                </div>
            </div>
            
            <div id="samples-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-8"></div>
        </section>

        <section id="view-viewer" class="hidden stagger-1">
            <div class="max-w-6xl mx-auto">
                <div class="flex flex-col lg:flex-row gap-6 md:gap-10">
                    <div class="flex-grow">
                        <div class="viewport-frame">
                            <div class="viewport-inner relative h-[50vh] sm:h-[60vh] lg:h-[70vh]">
                                <div id="loading-indicator" class="absolute inset-0 flex items-center justify-center bg-black/60 backdrop-blur-md z-20 hidden">
                                    <div class="text-center">
                                        <div class="w-10 h-10 border-2 border-accent/20 border-t-accent rounded-full animate-spin mx-auto mb-4"></div>
                                        <div class="text-[9px] font-black uppercase tracking-[0.2em] text-accent">Procesando Malla</div>
                                    </div>
                                </div>
                                <model-viewer 
                                    id="mv-container" 
                                    camera-controls 
                                    auto-rotate 
                                    rotation-per-second="60deg" 
                                    shadow-intensity="1" 
                                    exposure="0.8" 
                                    environment-image="neutral"
                                    bounds="tight"
                                    camera-orbit="0deg 75deg auto"
                                    interaction-prompt="auto"
                                    ar-modes="webxr scene-viewer quick-look">
                                </model-viewer>
                            </div>
                        </div>
                    </div>

                    <div class="lg:w-80 flex flex-col justify-between py-2 md:py-6">
                        <div>
                            <span class="text-[9px] font-black text-accent uppercase tracking-[0.4em] block mb-2 md:mb-4">Especificaciones</span>
                            <h3 id="sample-name-viewer" class="text-2xl md:text-4xl font-black italic uppercase mb-4 md:mb-6 leading-none">Cargando...</h3>
                            <div class="h-px w-full bg-white/5 mb-4 md:mb-6"></div>
                            <p id="sample-desc-viewer" class="text-slate-400 text-sm leading-relaxed mb-6 md:mb-8"></p>
                        </div>
                        
                        <div class="space-y-4">
                            <button onclick="showView('samples')" class="btn-premium w-full text-[10px] uppercase">
                                Salir del Laboratorio
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-admin" class="hidden stagger-1">
            <div class="bg-slate-900/40 border border-white/5 rounded-3xl md:rounded-[3rem] p-6 md:p-12">
                <div class="flex flex-col lg:flex-row justify-between gap-6 md:gap-8 mb-8 md:mb-12">
                    <div class="flex items-center gap-4 md:gap-6">
                        <button onclick="showView('home')" class="w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl border border-white/10 flex items-center justify-center hover:bg-accent hover:text-black transition-all group">
                            <i class="fas fa-arrow-left text-sm md:text-base"></i>
                        </button>
                        <h2 class="text-3xl md:text-5xl font-black italic uppercase tracking-tighter text-white">Vextli <span class="text-accent">Admin</span></h2>
                    </div>
                    <div class="flex flex-col sm:flex-row gap-3">
                        <input type="text" id="admin-brand-input" placeholder="Nueva empresa..." class="bg-black/50 border border-white/10 rounded-xl md:rounded-2xl px-5 md:px-6 py-3 md:py-4 text-sm outline-none focus:border-accent w-full sm:w-64 text-white">
                        <button onclick="addBrand()" class="bg-accent text-black py-3 md:py-0 px-6 md:px-8 rounded-xl md:rounded-2xl font-black uppercase text-[10px] md:text-xs hover:scale-105 transition-transform">Crear</button>
                    </div>
                </div>

                <div class="grid lg:grid-cols-3 gap-6 md:gap-8">
                    <div class="lg:col-span-1 space-y-3" id="admin-brands-list"></div>
                    <div class="lg:col-span-2">
                        <div class="bg-black/40 rounded-2xl md:rounded-[2.5rem] border border-white/5 p-6 md:p-10">
                            <h3 class="text-[10px] font-black uppercase tracking-[0.3em] mb-6 md:mb-8 text-accent">Nuevo Prototipo 3D</h3>
                            <form id="admin-sample-form" class="space-y-4 md:space-y-6">
                                <div class="grid sm:grid-cols-2 gap-4 md:gap-6">
                                    <div class="space-y-2">
                                        <label class="text-[9px] font-bold text-slate-500 uppercase ml-2">Destinatario</label>
                                        <select id="admin-select-brand" class="w-full bg-black/40 border border-white/10 rounded-xl md:rounded-2xl p-3 md:p-4 text-sm outline-none text-white"></select>
                                    </div>
                                    <div class="space-y-2">
                                        <label class="text-[9px] font-bold text-slate-500 uppercase ml-2">Nombre Modelo</label>
                                        <input type="text" id="admin-sample-name" required class="w-full bg-black/40 border border-white/10 rounded-xl md:rounded-2xl p-3 md:p-4 text-sm outline-none text-white">
                                    </div>
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[9px] font-bold text-slate-500 uppercase ml-2">Notas de Ingeniería</label>
                                    <textarea id="admin-sample-desc" class="w-full bg-black/40 border border-white/10 rounded-xl md:rounded-2xl p-3 md:p-4 text-sm outline-none h-20 md:h-24 resize-none text-white"></textarea>
                                </div>
                                <div class="relative group cursor-pointer">
                                    <input type="file" id="admin-file" accept=".glb" class="absolute inset-0 opacity-0 z-10 cursor-pointer">
                                    <div class="border-2 border-dashed border-white/10 rounded-2xl md:rounded-3xl p-6 md:p-10 text-center group-hover:border-accent transition-all">
                                        <i class="fas fa-cube text-2xl md:text-3xl text-slate-700 mb-3 md:mb-4 group-hover:text-accent group-hover:rotate-12 transition-all"></i>
                                        <p class="text-[9px] md:text-[10px] font-black uppercase tracking-widest text-slate-500">Subir Archivo .GLB</p>
                                    </div>
                                </div>
                                <button type="submit" id="admin-submit-btn" class="btn-premium w-full text-[10px] md:text-[11px] uppercase">Publicar Prototipo</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA32fzj94oSeGgCa_7h7iEgoEpoJQggqpU",
            authDomain: "base-vextli.firebaseapp.com",
            projectId: "base-vextli",
            storageBucket: "base-vextli.firebasestorage.app",
            messagingSenderId: "589687023966",
            appId: "1:589687023966:web:c05e8ed8285309d2f747cf"
        };

        const appIdentifier = 'vextli-portal-v1';
        let db, auth, brandsData = [];

        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);

        window.showToast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `fixed bottom-4 right-4 md:bottom-8 md:right-8 bg-slate-900 border border-white/10 px-5 md:px-6 py-3 md:py-4 rounded-xl md:rounded-2xl flex items-center gap-3 md:gap-4 shadow-2xl z-[100] transition-opacity duration-300`;
            toast.innerHTML = `<div class="w-1.5 h-1.5 md:w-2 md:h-2 rounded-full ${type==='success'?'bg-accent shadow-[0_0_10px_#2dd4bf]':'bg-red-500 shadow-[0_0_10px_red]'}"></div><span class="text-[9px] md:text-[10px] font-black uppercase tracking-widest text-white">${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(()=>toast.remove(), 500); }, 3000);
        };

        window.showView = (v) => {
            ['home', 'samples', 'viewer', 'admin'].forEach(view => document.getElementById(`view-${view}`).classList.add('hidden'));
            document.getElementById(`view-${v}`).classList.remove('hidden');
            window.scrollTo(0,0);
        };

        window.requestAdminAccess = () => {
            const pass = prompt("Identificación Vextli:");
            if(pass && pass.toLowerCase() === "vextli") showView('admin');
        };

        window.addBrand = async () => {
            const name = document.getElementById('admin-brand-input').value.trim();
            if(!name) return;
            const id = 'b_' + Date.now();
            await setDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'brands', id), { id, name, samples: [], createdAt: Date.now() });
            document.getElementById('admin-brand-input').value = '';
            showToast("Partner Creado");
        };

        window.deleteBrand = async (id) => {
            if(confirm("¿Eliminar partner permanentemente?")) {
                await deleteDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'brands', id));
                showToast("Partner Eliminado", "error");
            }
        };

        window.openBrand = (brand) => {
            document.getElementById('brand-title').innerText = brand.name;
            const grid = document.getElementById('samples-grid');
            grid.innerHTML = brand.samples && brand.samples.length ? brand.samples.map(s => `
                <div class="bento-card p-6 md:p-10 cursor-pointer group" onclick='openViewer(${JSON.stringify(s)})'>
                    <div>
                        <div class="text-[8px] md:text-[9px] font-black text-accent uppercase tracking-[0.3em] md:tracking-[0.4em] mb-2 md:mb-4">${s.date}</div>
                        <h4 class="text-xl md:text-2xl font-black italic uppercase group-hover:text-accent transition-colors text-white">${s.name}</h4>
                    </div>
                    <div class="flex items-center justify-between mt-4">
                        <span class="text-[8px] md:text-[10px] text-slate-500 font-bold uppercase tracking-widest italic group-hover:translate-x-1 transition-transform">Ver <i class="fas fa-chevron-right ml-2 text-[8px]"></i></span>
                        <div class="w-8 h-8 md:w-10 md:h-10 rounded-full border border-white/5 flex items-center justify-center group-hover:bg-white transition-all">
                            <i class="fas fa-expand text-white group-hover:text-black text-xs"></i>
                        </div>
                    </div>
                </div>
            `).join('') : '<div class="col-span-full py-20 text-center text-slate-600 font-bold uppercase text-[10px] tracking-widest">Sin prototipos publicados</div>';
            showView('samples');
        };

        window.openViewer = async (sample) => {
            showView('viewer');
            const loader = document.getElementById('loading-indicator');
            document.getElementById('sample-name-viewer').innerText = sample.name;
            document.getElementById('sample-desc-viewer').innerText = sample.desc || 'No se han adjuntado especificaciones técnicas adicionales para esta pieza.';
            loader.classList.remove('hidden');
            try {
                const f = await getDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'files', sample.id));
                if(f.exists()) {
                    const mv = document.getElementById('mv-container');
                    mv.src = f.data().fileData;
                    mv.addEventListener('load', () => {
                        loader.classList.add('hidden');
                    }, {once: true});
                }
            } catch(e) { loader.classList.add('hidden'); showToast("Fallo en sincronización", "error"); }
        };

        signInAnonymously(auth).then(() => {
            onAuthStateChanged(auth, (user) => {
                if(user) {
                    onSnapshot(collection(db, 'artifacts', appIdentifier, 'public', 'data', 'brands'), (snap) => {
                        brandsData = snap.docs.map(d => d.data());
                        updateUI();
                        document.getElementById('loading-home').classList.add('hidden');
                    });
                }
            });
        });

        function updateUI() {
            const grid = document.getElementById('brands-grid');
            grid.innerHTML = brandsData.map((b) => `
                <div class="bento-card p-6 md:p-10 cursor-pointer group" onclick='openBrand(${JSON.stringify(b)})'>
                    <div class="w-10 h-10 md:w-12 md:h-12 bg-white/5 rounded-xl md:rounded-2xl flex items-center justify-center mb-6 md:mb-10 border border-white/10 group-hover:border-accent/40 transition-all">
                        <i class="fas fa-fingerprint text-slate-500 group-hover:text-accent text-sm md:text-base"></i>
                    </div>
                    <div>
                        <h3 class="text-xl md:text-2xl font-black italic uppercase mb-1 md:mb-2 group-hover:translate-x-1 transition-transform text-white">${b.name}</h3>
                        <div class="flex items-center gap-2 md:gap-3">
                            <div class="h-px w-6 md:w-8 bg-accent/30"></div>
                            <span class="text-[8px] md:text-[9px] font-black uppercase text-slate-500 tracking-widest">${b.samples?.length || 0} Prototipos</span>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('admin-brands-list').innerHTML = brandsData.map(b => `
                <div class="bg-black/40 border border-white/5 p-3 md:p-4 rounded-xl md:rounded-2xl flex justify-between items-center group">
                    <span class="text-[9px] md:text-[10px] font-black uppercase tracking-widest text-white truncate mr-2">${b.name}</span>
                    <button onclick="deleteBrand('${b.id}')" class="text-slate-700 hover:text-red-500 transition-colors px-2"><i class="fas fa-trash-alt text-xs"></i></button>
                </div>
            `).join('');

            document.getElementById('admin-select-brand').innerHTML = brandsData.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
        }

        document.getElementById('admin-sample-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('admin-submit-btn');
            const file = document.getElementById('admin-file').files[0];
            const brandId = document.getElementById('admin-select-brand').value;
            if(!file || !brandId) return showToast("Falta archivo .GLB", "error");

            btn.disabled = true;
            btn.innerText = "Sincronizando Malla...";

            const reader = new FileReader();
            reader.onload = async (ev) => {
                const sampleId = 's_' + Date.now();
                try {
                    await setDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'files', sampleId), { fileData: ev.target.result });
                    const meta = {
                        id: sampleId,
                        name: document.getElementById('admin-sample-name').value,
                        desc: document.getElementById('admin-sample-desc').value,
                        date: new Date().toLocaleDateString('es-ES', { month: 'short', year: 'numeric' }).toUpperCase()
                    };
                    await updateDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'brands', brandId), { samples: arrayUnion(meta) });
                    showToast("Prototipo Publicado");
                    e.target.reset();
                } catch(e) { showToast("Error en servidor", "error"); }
                btn.disabled = false; btn.innerText = "Publicar Prototipo";
            };
            reader.readAsDataURL(file);
        };

        document.addEventListener('mousemove', e => {
            if (window.innerWidth < 768) return;
            document.querySelectorAll('.bento-card').forEach(card => {
                const rect = card.getBoundingClientRect();
                card.style.setProperty('--x', `${e.clientX - rect.left}px`);
                card.style.setProperty('--y', `${e.clientY - rect.top}px`);
            });
        });
    </script>
</body>
</html>
