<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEXTLI | Centro de Prototipos 3D</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Google Model Viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617 !important; /* Forzamos fondo oscuro general */
            color: white; 
            overflow-x: hidden; 
        }
        
        /* Ambient Glows */
        .glow-bg-1 { position: fixed; top: -10%; left: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(45,212,191,0.08) 0%, rgba(2,6,23,0) 70%); z-index: -1; pointer-events: none; }
        .glow-bg-2 { position: fixed; bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(56,189,248,0.05) 0%, rgba(2,6,23,0) 70%); z-index: -1; pointer-events: none; }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .text-accent { color: #2dd4bf; }
        .bg-accent { background-color: #2dd4bf; }
        
        /* SOLUCIÓN AL FONDO EN CELULARES: 
           Añadimos un gradiente que no sea negro absoluto para que el llavero negro se vea */
        .canvas-container { 
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%) !important; 
            border-radius: 2.2rem;
        }
        
        .tool-btn {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
            border-radius: 2.2rem;
            /* Forzamos que el fondo del componente sea transparente para usar el del contenedor */
            background-color: transparent !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative">

    <div class="glow-bg-1"></div>
    <div class="glow-bg-2"></div>

    <!-- NAVBAR CORREGIDO: Enlace a la página principal -->
    <nav class="fixed w-full z-50 bg-slate-950/80 backdrop-blur-xl border-b border-white/5 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="https://vextli.github.io/VEXTLI/" class="flex items-center gap-3 group">
                <div class="w-10 h-10 bg-teal-400/10 rounded-xl flex items-center justify-center border border-teal-400/20 group-hover:border-teal-400/50 group-hover:bg-teal-400/20 transition-all shadow-[0_0_15px_rgba(45,212,191,0.1)]">
                    <i class="fas fa-cube text-accent text-lg"></i>
                </div>
                <div class="flex flex-col">
                    <span class="text-xl font-black italic tracking-tighter leading-none">VEXTLI</span>
                    <span class="text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold mt-1">Portal 3D</span>
                </div>
            </a>
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-accent animate-pulse"></div>
                    <div id="auth-status" class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Sincronizando</div>
                </div>
                <div class="h-6 w-px bg-white/10"></div>
                <button onclick="requestAdminAccess()" class="opacity-40 hover:opacity-100 transition-opacity p-2 text-slate-300 hover:text-accent">
                    <i class="fas fa-sliders-h text-lg"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-grow pt-32 px-6 pb-16 max-w-7xl mx-auto w-full relative z-10">
        
        <!-- HOME -->
        <section id="view-home" class="animate-fade-in">
            <header class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
                <div>
                    <h1 class="text-4xl md:text-6xl font-black italic uppercase tracking-tighter mb-4 text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400">
                        Nuestros <br><span class="text-accent">Clientes</span>
                    </h1>
                </div>
            </header>
            <div id="brands-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Ejemplo de tarjeta -->
                <div class="glass-card p-8 rounded-[2rem] cursor-pointer group" onclick="showView('viewer')">
                    <h3 class="font-black italic text-xl">Llavero Corporativo</h3>
                    <p class="text-xs text-slate-400 mt-2">Prueba de visibilidad modo oscuro.</p>
                </div>
            </div>
        </section>

        <!-- VISOR 3D CORREGIDO -->
        <section id="view-viewer" class="hidden animate-fade-in flex flex-col items-center">
            <div class="w-full max-w-6xl">
                <button onclick="showView('home')" class="mb-8 text-slate-400 hover:text-accent font-bold uppercase text-xs flex items-center gap-2 transition-colors">
                    <i class="fas fa-arrow-left"></i> Volver
                </button>

                <div class="glass-card rounded-[2.5rem] p-2 overflow-hidden relative border-white/10">
                    <!-- Contenedor con fondo específico para que se vea el negro -->
                    <div class="canvas-container w-full h-[65vh] relative">
                        <model-viewer 
                            id="mv-container"
                            src="tu_modelo.glb" 
                            camera-controls 
                            touch-action="pan-y" 
                            shadow-intensity="2"
                            exposure="1.5"
                            environment-image="neutral"
                            auto-rotate>
                        </model-viewer>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="border-t border-white/5 bg-slate-950/50 mt-auto relative z-10">
        <div class="max-w-7xl mx-auto px-6 py-8 flex justify-center">
            <p class="text-[10px] text-slate-500 uppercase tracking-widest">© 2026 Vextli. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script>
        // Funciones de navegación básica para la demo
        function showView(view) {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-viewer').classList.add('hidden');
            document.getElementById('view-' + view).classList.remove('hidden');
        }

        function requestAdminAccess() {
            alert("Acceso administrativo restringido.");
        }
    </script>
</body>
</html>
