<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEXTLI | Experience Center</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Google Model Viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

    <style>
        :root {
            --accent: #2dd4bf;
            --accent-glow: rgba(45, 212, 191, 0.4);
            --bg-dark: #010409;
            --surface: rgba(13, 17, 23, 0.7);
            --border: rgba(255, 255, 255, 0.05);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark); 
            color: #e6edf3; 
            overflow-x: hidden; 
            scroll-behavior: smooth;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.03;
            pointer-events: none;
            z-index: 50;
        }
        
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.15;
            animation: orbFloat 20s infinite alternate;
        }
        .orb-1 { top: -10%; right: -10%; width: min(500px, 80vw); height: min(500px, 80vw); background: var(--accent); }
        .orb-2 { bottom: -10%; left: -5%; width: min(600px, 90vw); height: min(600px, 90vw); background: #3b82f6; animation-delay: -5s; }

        @keyframes orbFloat {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(50px, 50px) scale(1.1); }
        }

        nav {
            background: rgba(1, 4, 9, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border);
        }

        .bento-card {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 32px;
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .bento-card:hover {
            transform: translateY(-8px);
            border-color: rgba(45, 212, 191, 0.3);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.5);
        }

        .viewport-frame {
            position: relative;
            background: #000;
            border-radius: 24px;
            padding: 8px;
            box-shadow: 0 0 0 1px var(--border), 0 20px 50px rgba(0,0,0,0.8);
        }

        .btn-premium {
            background: #fff;
            color: #000;
            padding: 14px 28px;
            border-radius: 100px;
            font-weight: 800;
            letter-spacing: -0.02em;
            transition: all 0.3s;
        }
        .btn-premium:hover {
            transform: scale(1.02);
            background: var(--accent);
        }

        /* Visores pequeños para previsualización */
        model-viewer.card-preview {
            width: 100%;
            height: 100%;
            pointer-events: none; /* No roba el scroll en celular */
            --poster-color: transparent;
        }

        .stagger-1 { animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes slideUp {
            from { transform: translateY(40px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* Botón de volver flotante para celular */
        .back-nav {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            color: #fff;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s;
        }
        .back-nav:active { scale: 0.95; background: var(--accent); color: #000; }
    </style>
</head>
<body class="min-h-screen">

    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div id="toast-container"></div>

    <nav class="fixed w-full z-50 px-4 md:px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="#" onclick="showView('home'); return false;" class="flex items-center gap-3 md:gap-4 cursor-pointer group">
                <div class="relative w-8 h-8 md:w-10 md:h-10">
                    <div class="absolute inset-0 bg-accent rounded-lg blur-lg opacity-20"></div>
                    <div class="relative w-full h-full bg-slate-900 border border-white/10 rounded-lg flex items-center justify-center">
                        <i class="fas fa-microchip text-accent text-sm"></i>
                    </div>
                </div>
                <div class="flex flex-col text-white">
                    <span class="text-lg font-black italic tracking-tighter uppercase leading-none">Vextli</span>
                    <span class="text-[8px] uppercase tracking-[0.3em] text-slate-500 font-bold">Portal NFC</span>
                </div>
            </a>
            <button onclick="requestAdminAccess()" class="w-10 h-10 rounded-full border border-white/5 flex items-center justify-center hover:bg-white/5 transition-all">
                <i class="fas fa-lock-open text-xs text-slate-500"></i>
            </button>
        </div>
    </nav>

    <main class="pt-24 md:pt-32 pb-10 px-4 max-w-7xl mx-auto relative z-10">
        
        <!-- VISTA HOME -->
        <section id="view-home" class="stagger-1">
            <div class="mb-12">
                <h1 class="text-5xl md:text-8xl font-black italic uppercase leading-[0.9] mb-4">Centro de<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-accent to-blue-500">Prototipos</span></h1>
                <p class="text-slate-400 max-w-xl font-medium">Selecciona un partner para explorar su catálogo de ingeniería 3D.</p>
            </div>
            <div id="loading-home" class="text-center py-20"><div class="inline-block w-8 h-8 border-2 border-accent/20 border-t-accent rounded-full animate-spin"></div></div>
            <div id="brands-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <!-- VISTA CATÁLOGO (CLIENTE) -->
        <section id="view-samples" class="hidden stagger-1">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
                <div class="flex items-center gap-4">
                    <button onclick="showView('home')" class="back-nav">
                        <i class="fas fa-chevron-left"></i> Volver
                    </button>
                    <div>
                        <h2 id="brand-title" class="text-3xl md:text-5xl font-black italic uppercase tracking-tighter">Empresa</h2>
                        <p class="text-[9px] uppercase tracking-[0.4em] text-accent font-bold">Archivo de prototipos</p>
                    </div>
                </div>
            </div>
            <div id="samples-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </section>

        <!-- VISTA VISUALIZADOR -->
        <section id="view-viewer" class="hidden stagger-1">
            <div class="max-w-6xl mx-auto">
                <div class="mb-8">
                    <button onclick="showView('samples')" class="back-nav">
                        <i class="fas fa-chevron-left"></i> Volver al Catálogo
                    </button>
                </div>
                <div class="flex flex-col lg:flex-row gap-10">
                    <div class="flex-grow">
                        <div class="viewport-frame">
                            <div class="viewport-inner relative h-[50vh] md:h-[70vh]">
                                <div id="loading-indicator" class="absolute inset-0 flex items-center justify-center bg-black/60 backdrop-blur-md z-20 hidden">
                                    <div class="text-center">
                                        <div class="w-10 h-10 border-2 border-accent/20 border-t-accent rounded-full animate-spin mx-auto mb-4"></div>
                                        <div class="text-[9px] font-black uppercase tracking-[0.2em] text-accent">Sincronizando Malla</div>
                                    </div>
                                </div>
                                <model-viewer id="mv-container" camera-controls auto-rotate shadow-intensity="1" environment-image="neutral" ar></model-viewer>
                            </div>
                        </div>
                    </div>
                    <div class="lg:w-80 flex flex-col justify-between">
                        <div>
                            <span class="text-[9px] font-black text-accent uppercase tracking-[0.4em] block mb-4">Especificaciones</span>
                            <h3 id="sample-name-viewer" class="text-4xl font-black italic uppercase mb-6 leading-none">...</h3>
                            <p id="sample-desc-viewer" class="text-slate-400 text-sm leading-relaxed mb-8"></p>
                        </div>
                        <button onclick="showView('samples')" class="btn-premium w-full text-[10px] uppercase">
                            Cerrar Visualizador
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- VISTA ADMIN -->
        <section id="view-admin" class="hidden stagger-1">
            <div class="bg-slate-900/40 border border-white/5 rounded-[2.5rem] p-8 md:p-12">
                <div class="flex items-center gap-6 mb-12">
                    <button onclick="showView('home')" class="back-nav"><i class="fas fa-arrow-left"></i></button>
                    <h2 class="text-4xl font-black italic uppercase text-white">Vextli <span class="text-accent">Admin</span></h2>
                </div>
                <!-- Los formularios de administración se mantienen aquí -->
                <div class="grid lg:grid-cols-2 gap-8">
                     <div class="bg-black/40 p-8 rounded-3xl border border-white/5">
                        <h3 class="text-accent text-[10px] font-black uppercase tracking-widest mb-6">Nueva Empresa</h3>
                        <form id="admin-brand-form" class="space-y-4">
                            <input type="text" id="admin-brand-input" placeholder="Nombre Empresa" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-accent">
                            <button type="submit" class="btn-premium w-full text-xs uppercase">Registrar</button>
                        </form>
                     </div>
                     <div class="bg-black/40 p-8 rounded-3xl border border-white/5">
                        <h3 class="text-accent text-[10px] font-black uppercase tracking-widest mb-6">Nuevo Prototipo</h3>
                        <form id="admin-sample-form" class="space-y-4">
                            <select id="admin-select-brand" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl"></select>
                            <input type="text" id="admin-sample-name" placeholder="Nombre Modelo" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl">
                            <input type="file" id="admin-file" accept=".glb" class="text-xs text-slate-500">
                            <button type="submit" class="btn-premium w-full text-xs uppercase">Publicar</button>
                        </form>
                     </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA32fzj94oSeGgCa_7h7iEgoEpoJQggqpU",
            authDomain: "base-vextli.firebaseapp.com",
            projectId: "base-vextli",
            storageBucket: "base-vextli.firebasestorage.app",
            messagingSenderId: "589687023966",
            appId: "1:589687023966:web:c05e8ed8285309d2f747cf"
        };

        const appIdentifier = 'vextli-portal-v1';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let brandsData = [];

        window.showView = (v) => {
            ['home', 'samples', 'viewer', 'admin'].forEach(view => document.getElementById(`view-${view}`).classList.add('hidden'));
            document.getElementById(`view-${v}`).classList.remove('hidden');
            window.scrollTo(0,0);
        };

        window.requestAdminAccess = () => {
            if(prompt("Identificación Vextli:") === "vextli") showView('admin');
        };

        // Escucha de datos
        signInAnonymously(auth).then(() => {
            onSnapshot(collection(db, 'artifacts', appIdentifier, 'public', 'data', 'brands'), (snap) => {
                brandsData = snap.docs.map(d => d.data());
                updateHomeUI();
                updateAdminUI();
                document.getElementById('loading-home').classList.add('hidden');
            });
        });

        function updateHomeUI() {
            const grid = document.getElementById('brands-grid');
            grid.innerHTML = brandsData.map(b => `
                <div class="bento-card p-8 cursor-pointer group min-h-[280px]" onclick='openBrand(${JSON.stringify(b)})'>
                    <div class="relative w-full h-40 bg-black/40 rounded-2xl mb-6 overflow-hidden border border-white/5 flex items-center justify-center">
                        <i class="fas fa-fingerprint text-4xl text-slate-700 group-hover:text-accent transition-colors"></i>
                        <div class="absolute inset-0 bg-accent/10 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <span class="bg-white text-black text-[10px] font-black px-4 py-2 rounded-full uppercase">Entrar</span>
                        </div>
                    </div>
                    <div>
                        <h3 class="text-3xl font-black italic uppercase text-white group-hover:text-accent transition-colors">${b.name}</h3>
                        <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest mt-2">${b.samples?.length || 0} Modelos Disponibles</p>
                    </div>
                </div>
            `).join('');
        }

        window.openBrand = (brand) => {
            document.getElementById('brand-title').innerText = brand.name;
            const grid = document.getElementById('samples-grid');
            
            grid.innerHTML = (brand.samples || []).map(s => `
                <div class="bento-card p-6 cursor-pointer group border-white/5 hover:border-accent/40 bg-black/40" onclick='openViewer(${JSON.stringify(s)})'>
                    <div class="w-full h-48 bg-black/60 rounded-2xl mb-6 relative overflow-hidden border border-white/5">
                        <!-- PREVISUALIZACIÓN 3D DIRECTA -->
                        <model-viewer class="card-preview" id="pv-${s.id}" auto-rotate rotation-per-second="40deg" interaction-prompt="none"></model-viewer>
                        
                        <div class="absolute inset-0 flex items-center justify-center bg-black/20 group-hover:bg-transparent transition-all">
                             <span class="bg-accent text-black text-[9px] font-black px-4 py-2 rounded-full uppercase opacity-0 group-hover:opacity-100 transform translate-y-4 group-hover:translate-y-0 transition-all">Expandir 3D</span>
                        </div>
                    </div>
                    <div class="flex justify-between items-end">
                        <div>
                            <div class="text-[8px] font-black text-accent uppercase tracking-widest mb-1">${s.date}</div>
                            <h4 class="text-xl font-black italic uppercase text-white truncate">${s.name}</h4>
                        </div>
                        <i class="fas fa-external-link-alt text-slate-700 group-hover:text-accent text-xs transition-colors"></i>
                    </div>
                </div>
            `).join('') || '<div class="col-span-full py-12 text-center text-slate-500 uppercase text-[10px] tracking-widest border border-dashed border-white/10 rounded-3xl">Sin modelos disponibles</div>';
            
            showView('samples');

            // Cargar los archivos de los visores de las tarjetas
            (brand.samples || []).forEach(async s => {
                const f = await getDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'files', s.id));
                if(f.exists()) document.getElementById(`pv-${s.id}`).src = f.data().fileData;
            });
        };

        window.openViewer = async (sample) => {
            showView('viewer');
            const loader = document.getElementById('loading-indicator');
            const mv = document.getElementById('mv-container');
            document.getElementById('sample-name-viewer').innerText = sample.name;
            document.getElementById('sample-desc-viewer').innerText = sample.desc || 'Documentación técnica del prototipo en proceso.';
            
            loader.classList.remove('hidden');
            mv.src = "";
            const f = await getDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'files', sample.id));
            if(f.exists()) {
                mv.src = f.data().fileData;
                mv.addEventListener('load', () => loader.classList.add('hidden'), {once: true});
            }
        };

        // Administración básica (actualizar listas)
        function updateAdminUI() {
            const select = document.getElementById('admin-select-brand');
            select.innerHTML = brandsData.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
        }

        // Formulario Empresa
        document.getElementById('admin-brand-form').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('admin-brand-input').value;
            const id = 'b_' + Date.now();
            await setDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'brands', id), { id, name, samples: [], createdAt: Date.now() });
            e.target.reset();
        };

        // Formulario Modelo
        document.getElementById('admin-sample-form').onsubmit = async (e) => {
            e.preventDefault();
            const brandId = document.getElementById('admin-select-brand').value;
            const name = document.getElementById('admin-sample-name').value;
            const file = document.getElementById('admin-file').files[0];
            if(!file) return;

            const sampleId = 's_' + Date.now();
            const reader = new FileReader();
            reader.onload = async (ev) => {
                await setDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'files', sampleId), { fileData: ev.target.result });
                const brand = brandsData.find(b => b.id === brandId);
                const newSamples = [...(brand.samples || []), { id: sampleId, name, date: new Date().toLocaleDateString() }];
                await setDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'brands', brandId), { ...brand, samples: newSamples });
                alert("Modelo Publicado");
                e.target.reset();
            };
            reader.readAsDataURL(file);
        };

    </script>
</body>
</html>
